<!DOCTYPE html>
<html>
<head>
  <title>First and Last Filters</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-3">First and Last Filters</h1>
    <p class="fs-5">First: <span class="text-primary">{{ text|first }}</span>, Last: <span class="text-danger">{{ text|last }}</span></p>
  </div>
</body>
</html>
