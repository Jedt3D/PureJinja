<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Error {{ error_code | default("Unknown") }}</title>
</head>
<body>
<div class="container py-4">
<div class="alert alert-danger">
<h1 class="alert-heading h4">Error {{ error_code | default("Unknown") }}</h1>
<p>{{ error_message | default("An unexpected error occurred.") }}</p>
{% if show_details %}<hr><pre class="mb-0">{{ error_details }}</pre>{% endif %}
</div>
</div>
</body>
</html>
