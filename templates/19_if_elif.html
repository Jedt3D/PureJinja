<!DOCTYPE html>
<html>
<head>
  <title>If Elif Else</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-3">If Elif Else</h1>
    {% if role == "admin" %}<div class="alert alert-danger">Admin</div>{% elif role == "user" %}<div class="alert alert-info">User</div>{% else %}<div class="alert alert-secondary">Guest</div>{% endif %}
  </div>
</body>
</html>
