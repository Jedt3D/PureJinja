<!DOCTYPE html>
<html>
<head>
  <title>If Else</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-3">If Else</h1>
    {% if logged_in %}<div class="alert alert-success">Welcome!</div>{% else %}<div class="alert alert-secondary">Guest</div>{% endif %}
  </div>
</body>
</html>
