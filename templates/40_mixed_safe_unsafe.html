<!DOCTYPE html>
<html>
<head>
    <title>Mixed Safe Unsafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-subtitle mb-2 text-muted">Safe part</h6>
            <div>{{ safe_part }}</div>
        </div>
    </div>
    <div class="card">
        <div class="card-body">
            <h6 class="card-subtitle mb-2 text-muted">Unsafe part</h6>
            <pre class="bg-light p-3 rounded mb-0">{{ unsafe_part }}</pre>
        </div>
    </div>
</div>
</body>
</html>
