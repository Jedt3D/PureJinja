<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Navigation</title>
</head>
<body>
<div class="container py-4">
<nav class="nav">
{% for link in links %}
{% if link.url == active_url %}<strong class="nav-link active">{{ link.label }}</strong>{% else %}<a class="nav-link" href="{{ link.url }}">{{ link.label }}</a>{% endif %}
{% endfor %}
</nav>
</div>
</body>
</html>
