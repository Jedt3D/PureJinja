<!DOCTYPE html>
<html>
<head>
    <title>Set In Scope</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    {% set x = "outer" %}{% if true %}{% set x = "inner" %}<p class="fs-5"><span class="badge bg-primary">{{ x }}</span></p>{% endif %}<p class="fs-5"><span class="badge bg-secondary">{{ x }}</span></p>
</div>
</body>
</html>
