<!DOCTYPE html>
<html>
<head>
  <title>Length Filter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-3">Length Filter</h1>
    <p class="fs-5"><span class="badge bg-info">{{ text|length }}</span> characters</p>
  </div>
</body>
</html>
