<!DOCTYPE html>
<html>
<head>
    <title>Escape Attributes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <p class="fs-5">Link with escaped attributes:</p>
    <pre class="bg-light p-3 rounded"><code>&lt;a href="{{ url }}"&gt;{{ link_text }}&lt;/a&gt;</code></pre>
    <p><a href="{{ url }}" class="btn btn-outline-primary">{{ link_text }}</a></p>
</div>
</body>
</html>
