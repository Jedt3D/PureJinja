<!DOCTYPE html>
<html>
<head>
    <title>For Nested</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    {% for group in groups %}<div class="card mb-3"><div class="card-body">{% for item in group %}<span class="badge bg-secondary me-1">{{ item }}</span>{% endfor %}</div></div>{% endfor %}
</div>
</body>
</html>
