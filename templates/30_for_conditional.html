<!DOCTYPE html>
<html>
<head>
    <title>For Conditional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <ul class="list-group">{% for item in items %}{% if item != "skip" %}<li class="list-group-item">{{ item }}</li>{% endif %}{% endfor %}</ul>
</div>
</body>
</html>
