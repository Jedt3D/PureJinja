<!DOCTYPE html>
<html>
<head>
    <title>For First Last</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <p class="fs-5">{% for item in items %}{% if loop.first %}<span class="badge bg-primary">{% endif %}{{ item }}{% if loop.last %}</span>{% endif %}{% if not loop.last %}, {% endif %}{% endfor %}</p>
</div>
</body>
</html>
