<!DOCTYPE html>
<html>
<head>
    <title>For Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <ul class="list-group">{% for item in items %}<li class="list-group-item"><span class="badge bg-info me-2">{{ loop.index0 }}/{{ loop.length }}</span>{{ item }}</li>{% endfor %}</ul>
</div>
</body>
</html>
